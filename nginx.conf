server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — react-router-dom v6 라우트가 refresh 시 404 안 나도록
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 정적 자산 = CRA가 content-hash로 파일명 만들어주니 영원캐시 OK
  location ~* \.(?:js|mjs|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # index.html은 캐싱 X (새 빌드 즉시 반영)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  # 헬스체크 — k8s probe 가 / 을 200 받으면 OK
  # 별도 endpoint 안 만들고 / 로 fallback
}
